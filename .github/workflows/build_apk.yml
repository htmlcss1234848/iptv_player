name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Manual trigger from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Flutter ─────────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true

      # ── Dependencies ─────────────────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug --verbose

      # ── Upload APK artifact ──────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # ── Create GitHub Release (on push to main) ──────────────────────────────
      - name: Get version from pubspec
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: IPTV Player v${{ steps.version.outputs.version }}
          body: |
            ## IPTV Player Debug Build
            
            ### What's included
            - Native ExoPlayer (Media3) via Platform Channel
            - HLS (.m3u8), TS, Xtream Codes, Direct stream support
            - Debug info overlay (bitrate, codec, resolution, fps, dropped frames)
            - Auto retry on failure
            - Recent URLs history
            
            ### Install
            Download `app-debug.apk` and install on your Android device.
            Enable "Install from unknown sources" if needed.
            
            > Debug build — not signed for production.
          files: build/app/outputs/flutter-apk/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
