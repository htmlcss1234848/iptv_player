name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Generate local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Ensure gradlew executable
        run: chmod +x android/gradlew

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Get version
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Delete old release if exists
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          gh release delete "v${{ steps.version.outputs.version }}" --yes 2>/dev/null || true
          git push --delete origin "v${{ steps.version.outputs.version }}" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release with APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: IPTV Player v${{ steps.version.outputs.version }}
          body: |
            ## IPTV Player Debug Build

            ### Features
            - ✅ Native ExoPlayer (Media3) via Platform Channel
            - ✅ HLS (.m3u8), TS, Xtream Codes, Direct HTTP stream
            - ✅ Debug overlay — bitrate, codec, fps, dropped frames
            - ✅ Custom headers support
            - ✅ Auto retry on failure (3x)
            - ✅ Recent URLs history

            ### Install
            1. Download `app-debug.apk`
            2. Enable unknown sources
            3. Install APK
          files: build/app/outputs/flutter-apk/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
