name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Split APKs
        run: flutter build apk --debug --split-per-abi

      - name: Upload arm64-v8a (Modern phones)
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk

      - name: Upload armeabi-v7a (Old phones)
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk
